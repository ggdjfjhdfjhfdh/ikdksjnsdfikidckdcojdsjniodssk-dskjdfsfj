<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001b29" />
      <stop offset="100%" stop-color="#002b45" />
    </linearGradient>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.035)" />
    </pattern>
    <mask id="mask"><rect width="100%" height="100%" fill="url(#dots)" /></mask>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad)" />
  <rect width="100%" height="100%" fill="url(#grad)" mask="url(#mask)" />
</svg>
